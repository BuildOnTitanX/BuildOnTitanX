media: public/uploads

content:
  - name: pagescms
    label: Modular Page
    type: file
    path: src/content/pagescms.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: blocks
        label: Content Blocks
        type: block
        list: true
        blocks:
          - name: hero
            label: Hero Section
            fields:
              - name: heading
                label: Heading
                type: string
                required: true
              - name: subheading
                label: Subheading
                type: string
              - name: image
                label: Image
                type: image
                required: true
          - name: card
            label: Card
            fields:
              - name: title
                label: Title
                type: string
                required: true
              - name: description
                label: Description
                type: text
              - name: image
                label: Image
                type: image
          - name: code
            label: Code Block
            fields:
              - name: language
                label: Language
                type: string
                default: javascript
              - name: code
                label: Code
                type: code
