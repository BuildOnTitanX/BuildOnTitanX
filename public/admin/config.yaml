backend:
  name: git-gateway
  branch: develop # or your actual branch name

media_folder: 'public/uploads'
public_folder: '/uploads'

collections:
  - name: 'homepage'
    label: 'Homepage'
    files:
      - file: 'src/content/homepage.md' # Adjust if different
        label: 'Home'
        name: 'home'
        fields:
          - { label: 'Title', name: 'title', widget: 'string' }
          - label: 'Blocks'
            name: 'blocks'
            widget: 'list'
            types:
              - label: 'Card'
                name: 'card'
                widget: 'object'
                fields:
                  - { label: 'Title', name: 'title', widget: 'string' }
                  - { label: 'Description', name: 'description', widget: 'string' }
